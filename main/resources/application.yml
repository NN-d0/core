server:
  port: 9200

spring:
  application:
    name: core
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        username: nacos
        password: nacos
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/radio_spectrum_monitor?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: mygo
    password: 123456
  data:
    redis:
      host: 127.0.0.1
      port: 16379
      database: 0
      timeout: 5000ms
      password: 123456

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    banner: false

jwt:
  secret: radio-spectrum-monitor-demo-secret-key-20260313

ai:
  enabled: true
  base-url: http://127.0.0.1:9300
  predict-path: /predict
  connect-timeout-ms: 3000
  read-timeout-ms: 5000
  default-model-type: cnn

monitor:
  offline-timeout-seconds: 30
  offline-check-interval-ms: 5000
  station-online-cache-ttl-seconds: 300